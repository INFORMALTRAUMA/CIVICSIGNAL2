<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civic Signal Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Space Grotesk", system-ui, sans-serif;
        background: radial-gradient(circle at 15% 15%, #f0c66a 0%, #f7f2e8 40%, #fff8ef 100%);
        color: #101512;
      }
      .card {
        width: min(560px, calc(100vw - 2rem));
        border: 1px solid #e5dccd;
        border-radius: 24px;
        background: rgba(255, 248, 239, 0.92);
        box-shadow: 0 24px 50px rgba(16, 21, 18, 0.12);
        padding: 28px;
      }
      h1 {
        margin: 0;
        font-size: 2rem;
      }
      p {
        margin-top: 0.8rem;
        color: #2f3a33;
        line-height: 1.5;
      }
      .hint {
        margin-top: 1rem;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>Civic Signal cannot reach the network right now. Reconnect to sync live issue updates and submissions.</p>
      <p class="hint">Offline mode active</p>
    </main>
  </body>
</html>
